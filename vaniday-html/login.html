<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log in - Vaniday</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="center-page">
  <div class="card">
    <h1>Welcome back</h1>
    <p class="muted">Log in to Vaniday</p>

    <button class="btn btn-outline full" onclick="googleLogin()">
      Continue with Google
    </button>

    <form onsubmit="loginUser(event)">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" class="btn btn-dark full">Log in</button>
    </form>

    <p class="center">
      No account? <a href="signup.html">Sign up</a>
    </p>
  </div>

  <script>
    function loginUser(e) {
      e.preventDefault();
      alert("Logged in!");
      window.location.href = "dashboard.html";
    }
    function googleLogin() {
      alert("Signed in with Google!");
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
